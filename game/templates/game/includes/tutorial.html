<button type="button" class="tutorial-help-button" id="tutorialHelpButton">
    <span>?</span>
</button>

<!-- チュートリアルオーバーレイ -->
<div class="tutorial-overlay" id="tutorialOverlay">
    <div class="tutorial-shell">
        <div class="tutorial-container">
            <div class="tutorial-content-area">
                <div class="tutorial-image-area">
                    <img id="tutorialSlideImage" src="" alt="チュートリアル画像">
                </div>
                <div class="tutorial-description-area">
                    <p id="tutorialSlideDescription">説明文がここに表示されます</p>
                </div>
            </div>
        </div>

        <div class="tutorial-navigation">
            <button type="button" class="tutorial-nav-button" id="tutorialPrevButton" disabled>◀</button>
            <div class="tutorial-indicators" id="tutorialIndicators">
                <!-- JavaScriptで動的に生成 -->
            </div>
            <button type="button" class="tutorial-nav-button" id="tutorialNextButton">▶</button>
        </div>
    </div>
</div>
