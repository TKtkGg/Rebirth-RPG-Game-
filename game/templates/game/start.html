{% extends 'game/base.html' %}
{% load static %}

{% block title %}ゲーム開始 | RPG Game{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'game/css/start.css' %}">
{% endblock %}

{% block content %}
<div class="start-screen">
    <div class="start-title">職業選択</div>
    <form method="POST" class="job-form">
        {% csrf_token %}
        <div class="name-row">
            <label for="name" class="name-label">名前</label>
            <input type="text" name="name" id="name" class="name-input" placeholder="冒険者の名前を入力" value="{{ default_name }}" required>
        </div>

        <input type="hidden" name="job" id="jobInput" value="">

        <div class="job-grid">
            {% for slot in job_slots %}
                <button type="button"
                        class="job-card{% if not slot.unlocked %} locked{% endif %}"
                        data-job="{{ slot.name }}"
                        data-description="{{ slot.description }}"
                        data-bonus="{{ slot.bonus }}"
                        {% if not slot.unlocked %}disabled{% endif %}>
                    <img src="{% static slot.icon %}" alt="{{ slot.name|default:'未開放' }}" class="job-icon{% if not slot.unlocked %} job-icon-locked{% endif %}">
                    {% if slot.unlocked %}
                        <div class="job-name">{{ slot.name }}</div>
                    {% endif %}
                </button>
            {% endfor %}
        </div>

        <button type="submit" class="start-button">冒険を始める</button>
    </form>
</div>

<div class="job-tooltip" id="jobTooltip">
    <div id="jobTooltipContent"></div>
</div>

{% endblock %}

{% block extra_js %}
<script src="{% static 'game/js/start.js' %}"></script>
{% endblock %}
