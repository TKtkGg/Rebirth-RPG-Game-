{% extends 'game/base.html' %}

{% block title %}ゲーム開始 | RPG Game{% endblock %}

{% block content %}
<style>
    .character-creation {
        max-width: 600px;
        margin: 50px auto;
        padding: 40px;
        background: rgba(0, 0, 0, 0.8);
        border: 3px solid #8b6914;
        border-radius: 15px;
        color: #f0e6d2;
    }
    
    .character-creation h2 {
        color: #d4af37;
        text-align: center;
        margin-bottom: 30px;
        font-size: 32px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
    }
    
    .form-group {
        margin-bottom: 25px;
    }
    
    .form-label {
        display: block;
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 10px;
        color: #d4af37;
    }
    
    .form-control {
        width: 100%;
        padding: 12px;
        font-size: 18px;
        border: 2px solid #8b6914;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.9);
        color: #000;
    }
    
    .form-control:focus {
        outline: none;
        border-color: #d4af37;
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
    }
    
    .job-select {
        width: 100%;
        padding: 12px;
        font-size: 18px;
        border: 2px solid #8b6914;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.9);
        color: #000;
        cursor: pointer;
    }
    
    .job-description {
        margin-top: 10px;
        padding: 15px;
        background: rgba(139, 105, 20, 0.3);
        border-radius: 8px;
        font-size: 16px;
        line-height: 1.6;
    }
    
    .start-button {
        width: 100%;
        padding: 18px;
        font-size: 24px;
        font-weight: bold;
        background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        color: white;
        border: 3px solid #d4af37;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        margin-top: 20px;
    }
    
    .start-button:hover {
        background: linear-gradient(135deg, #c82333 0%, #bd2130 100%);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(220, 53, 69, 0.6);
    }
</style>

<div class="character-creation">
    <h2>キャラクター作成</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="name" class="form-label">あなたの名前</label>
            <input type="text" name="name" id="name" class="form-control" placeholder="冒険者の名前を入力" value="{{ default_name }}" required>
        </div>
        
        <div class="form-group">
            <label for="job" class="form-label">職業を選択</label>
            <select name="job" id="job" class="job-select" required>
                <option value="戦士">戦士</option>
                <option value="魔法使い">魔法使い</option>
                <option value="忍者">忍者</option>
            </select>
            
            <div class="job-description" id="job-desc">
                <strong>戦士：</strong>体力、攻撃力、防御力が高いが、スピードは遅め。<br>
                <strong>ジョブボーナス：</strong>HP +10, ATK +3, DEF +3, SPD -3
            </div>
        </div>
        
        <button type="submit" class="start-button">冒険を始める</button>
    </form>
</div>

<script>
    const jobSelect = document.getElementById('job');
    const jobDesc = document.getElementById('job-desc');
    
    const descriptions = {
        '戦士': '<strong>戦士：</strong>体力、攻撃力、防御力が高いが、スピードは遅め。<br><strong>ジョブボーナス：</strong>HP +10, ATK +3, DEF +3, SPD -3',
        '魔法使い': '<strong>魔法使い：</strong>高い攻撃力を持つが、打たれ弱い。<br><strong>ジョブボーナス：</strong>HP -5, ATK +7, DEF -2',
        '忍者': '<strong>忍者：</strong>攻撃力、スピードのあるジョブ。他はフツー。<br><strong>ジョブボーナス：</strong>HP -5, ATK +3, SPD +5'
    };
    
    jobSelect.addEventListener('change', function() {
        jobDesc.innerHTML = descriptions[this.value];
    });
</script>

{% endblock %}
