{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゲームオーバー</title>
    <link rel="stylesheet" href="{% static 'game/css/gameover.css' %}">
</head>
<body style="--gameover-bg: url('{% static 'game/img/背景/ゲームオーバー.jpg' %}');" data-score="{{ score }}" data-initial-point="{{ initial_point }}">
    <div class="gameover-container">
        <h1 class="gameover-title">GAME OVER</h1>
        <div class="score-info">
            <div><span class="score-label">Score：</span><span id="score-value">{{ score }}</span></div>
            <div class="score-point-row"><span class="score-label">スコアポイント：</span><span id="init-point-value">0</span></div>
        </div>
    </div>
    <div class="gameover-buttons">
        <a href="{% url 'game:score_breakdown' %}" class="gameover-link">
            <button class="gameover-btn" id="breakdown-btn" type="button">内訳を確認する</button>
        </a>
        <div class="gameover-actions">
            {% if is_guest %}
                <form action="/" method="get" class="gameover-form">
                    <button class="gameover-btn" type="submit">タイトルに戻る</button>
                </form>
            {% else %}
                <form action="/" method="get" class="gameover-form">
                    <button class="gameover-btn" type="submit">タイトルに戻る</button>
                </form>
                <form action="{% url 'game:score_points' %}" method="get" class="gameover-form">
                    <button class="gameover-btn" type="submit">ポイント分けへ</button>
                </form>
            {% endif %}
        </div>
    </div>
    <script src="{% static 'game/js/gameover.js' %}"></script>
</body>
</html>
