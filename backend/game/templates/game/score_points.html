{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スコアポイント振り分け</title>
    <link rel="stylesheet" href="{% static 'game/css/score_points.css' %}">
</head>
<body>
    <div class="score-title">スコアポイント振り分け</div>
    <div class="score-points-board">
        <div class="category-list">
            {% for category in categories %}
                <form method="get">
                    <button class="category-item{% if category.key == category_key %} active{% endif %}" type="submit" name="category" value="{{ category.key }}">{{ category.label }}</button>
                </form>
            {% endfor %}
        </div>
        <div class="content-area">
            <div class="stats-grid">
                {% for item in stat_items %}
                    <div class="{{ item.card_class }}">
                        <div class="stat-label">{{ item.label|safe }}</div>
                        <div class="stat-value">{{ item.current }} <span class="arrow">→</span> {{ item.next }}</div>
                        {% if score_points|default:0 > 0 %}
                            <form method="post">
                                {% csrf_token %}
                                <input type="hidden" name="category" value="{{ category_key }}">
                                <button class="plus-btn" type="submit" name="stat" value="{{ item.key }}">＋</button>
                            </form>
                        {% endif %}
                    </div>
                {% endfor %}
                <div class="points-row">
                    <span class="points-label">ポイント：</span>
                    <span class="points-value">{{ score_points }}</span>
                </div>
            </div>
        </div>
    </div>
    <div class="score-footer">
        <form action="/" method="get" style="margin:0;">
            <button class="score-btn" type="submit">タイトルに戻る</button>
        </form>
        <form action="{% url 'game:start' %}" method="get" style="margin:0;">
            <button class="score-btn" type="submit">続けてプレイ</button>
        </form>
    </div>
</body>
</html>
