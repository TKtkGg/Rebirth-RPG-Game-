<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RPG Game{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('/media/アカウント背景.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        .game-title {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 100px;
            font-weight: bold;
            color: #fff;
            text-shadow: 
                4px 4px 8px rgba(0, 0, 0, 0.8),
                -2px -2px 4px rgba(255, 255, 255, 0.3);
            letter-spacing: 3px;
            z-index: 10;
            white-space: nowrap;
        }
        
        .content-container {
            position: relative;
            z-index: 5;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 100px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="background-container"></div>
    
    <div class="game-title">Rebirth/リバース</div>
    
    <div class="content-container">
        {% block content %}
        {% endblock %}
    </div>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
