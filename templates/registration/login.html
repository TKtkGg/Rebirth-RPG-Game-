{% extends "base.html" %}

{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'accounts/css/auth.css' %}">
{% endblock %}

{% block content %}
<div class="login-container auth-container">
    <div class="login-box auth-box">
        <h2>ログイン</h2>
        
        {% if form.errors %}
        <div class="error-messages">
            <p>ユーザー名またはパスワードが正しくありません。</p>
        </div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_username">ユーザー名</label>
                <input type="text" name="username" id="id_username" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="id_password">パスワード</label>
                <input type="password" name="password" id="id_password" required autocomplete="off">
            </div>
            
            <button type="submit" class="btn-submit">ログイン</button>
        </form>
        
        <div class="back-link auth-back-link">
            <a href="{% url 'accounts:home' %}">← ホームに戻る</a>
        </div>
    </div>
</div>
{% endblock %}
